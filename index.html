<script>
/* ================================================================
   DATABASE AWAL (db.json)
   ================================================================ */
var DEFAULT_DB = {
  pelanggan: [], produk: [], pesanan: [], perekapan: [],
  admins: [
    { id:'sa_root', username:'superadmin', password:'super123', nama:'Super Admin', role:'superadmin', active:true, createdAt:'2025-01-01T00:00:00.000Z' },
    { id:'sa_def',  username:'admin',      password:'admin123', nama:'Admin',       role:'admin',     active:true, createdAt:'2025-01-01T00:00:00.000Z' }
  ]
};

/* ===== STATE ===== */
var APP = { data:null, page:'dashboard', charts:{}, theme:'light', isLoggedIn:false, selectedNotaId:null, userRole:null, notaSettings:{ namaToko:'Eco Sport Jersey', alamatToko:'Jl. Olahraga No. 88, Bandung', telpToko:'0812-3456-7890', emailToko:'info@ecosportjersey.com', showStamp:true, showQR:true, notaType:'invoice' } };

function gid(){ return 'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6); }
function fRp(n){ return 'Rp '+(n||0).toLocaleString('id-ID'); }
function fDt(d){ if(!d) return '-'; return new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }
function fDtFull(d){ if(!d) return '-'; return new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}); }
function fToday(){ return new Date().toISOString().split('T')[0]; }

/* ===== DATA ===== */
function emptyData(){ return { pelanggan:[], produk:[], pesanan:[], perekapan:[] }; }
function loadData(){
  try{ var s=localStorage.getItem('ecoSportData'); if(s) return JSON.parse(s); }catch(e){}
  var d={ pelanggan:DEFAULT_DB.pelanggan, produk:DEFAULT_DB.produk, pesanan:DEFAULT_DB.pesanan, perekapan:DEFAULT_DB.perekapan };
  saveData(d); return d;
}
function saveData(d){ localStorage.setItem('ecoSportData',JSON.stringify(d)); }
function loadNotaSettings(){ try{ var s=localStorage.getItem('ecoNotaSettings'); if(s){ var p=JSON.parse(s); for(var k in p) APP.notaSettings[k]=p[k]; } }catch(e){} }
function saveNotaSettings(){ localStorage.setItem('ecoNotaSettings',JSON.stringify(APP.notaSettings)); }

/* ===== DATABASE EXPORT/IMPORT ===== */
function dbExport(){
  var exportObj = { _meta:{appName:'Eco Sport Jersey',exportedAt:new Date().toISOString(),version:'1.0'}, pelanggan:APP.data.pelanggan, produk:APP.data.produk, pesanan:APP.data.pesanan, perekapan:APP.data.perekapan, admins:loadAdmins() };
  var blob = new Blob([JSON.stringify(exportObj,null,2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href=url; a.download='eco-sport-db-'+fToday()+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('Database berhasil di-export','success');
}
function dbImportFile(e){
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var obj=JSON.parse(ev.target.result);
      if(!obj.pelanggan||!obj.produk||!obj.pesanan) throw new Error('Format tidak valid');
      showConfirm('Import database akan menimpa semua data saat ini. Lanjutkan?',function(){
        APP.data.pelanggan=obj.pelanggan||[]; APP.data.produk=obj.produk||[]; APP.data.pesanan=obj.pesanan||[]; APP.data.perekapan=obj.perekapan||[];
        saveData(APP.data);
        if(obj.admins) localStorage.setItem('ecoAdminUsers',JSON.stringify(obj.admins));
        go(APP.page); toast('Database berhasil di-import','success');
      });
    }catch(err){ toast('File tidak valid: '+err.message,'error'); }
  };
  reader.readAsText(file); e.target.value='';
}
function dbTriggerImport(){ document.getElementById('dbImportInput').click(); }

/* ===== ADMIN DATA ===== */
function loadAdmins(){
  try{ var s=localStorage.getItem('ecoAdminUsers'); if(s) return JSON.parse(s); }catch(e){}
  localStorage.setItem('ecoAdminUsers',JSON.stringify(DEFAULT_DB.admins));
  return DEFAULT_DB.admins;
}

/* ===== ROLE PERMISSIONS ===== */
var PERMISSIONS = {
  superadmin: ['dashboard','pesanan','pelanggan','produk','perekapan','nota','laporan','kelolaAdmin'],
  admin: ['dashboard','pesanan','pelanggan','produk']
};
function canAccess(page){ return (PERMISSIONS[APP.userRole]||[]).indexOf(page)>=0; }
function firstAllowed(){ var p=PERMISSIONS[APP.userRole]||['dashboard']; return p[0]; }

/* ===== AUTH ===== */
function login(){
  var u=document.getElementById('loginUser').value, p=document.getElementById('loginPass').value;
  var admins=loadAdmins(), found=null;
  for(var i=0;i<admins.length;i++){ if(admins[i].username===u && admins[i].password===p && admins[i].active){ found=admins[i]; break; } }
  if(found){
    APP.userRole=found.role; APP.isLoggedIn=true;
    localStorage.setItem('ecoSportLogin','true'); localStorage.setItem('ecoUserRole',found.role); localStorage.setItem('ecoUserName',found.nama);
    document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('appContainer').classList.remove('hidden');
    applyRoleUI(); go('dashboard');
    toast('Selamat datang, '+found.nama+'!'+(found.role==='superadmin'?' <i class="fas fa-crown text-amber-400"></i>':''),'success');
    return;
  }
  document.getElementById('loginError').classList.remove('hidden'); document.getElementById('loginPass').value='';
  setTimeout(function(){ document.getElementById('loginError').classList.add('hidden'); },3000);
}
function logout(){
  localStorage.removeItem('ecoSportLogin'); localStorage.removeItem('ecoUserRole'); localStorage.removeItem('ecoUserName');
  APP.isLoggedIn=false; APP.userRole=null;
  document.getElementById('appContainer').classList.add('hidden'); document.getElementById('loginScreen').classList.remove('hidden');
  stripSuperUI();
}

/* ===== ROLE UI ===== */
function applyRoleUI(){
  var perms=PERMISSIONS[APP.userRole]||[];
  var navItems=document.querySelectorAll('#sidebar nav .nav-item');
  for(var i=0;i<navItems.length;i++){ var pg=navItems[i].getAttribute('data-page'); navItems[i].style.display=(pg && perms.indexOf(pg)<0)?'none':''; }
  if(APP.userRole==='superadmin') injectSaNav(); else stripSuperUI();
  var rb=document.querySelectorAll('button[title="Reset Data"]'); for(var j=0;j<rb.length;j++) rb[j].style.display=APP.userRole==='superadmin'?'':'none';
  refreshSidebarUser();
}
function injectSaNav(){
  if(document.getElementById('navSaAdmin')) return;
  var nav=document.querySelector('#sidebar nav'); if(!nav) return;
  var sep=document.createElement('div'); sep.id='saSep'; sep.style.cssText='margin:8px 12px;border-top:1px solid '+(APP.theme==='dark'?'#1e293b':'#e2e8f0');
  nav.appendChild(sep);
  var a=document.createElement('a'); a.id='navSaAdmin'; a.setAttribute('data-page','kelolaAdmin');
  a.className='nav-item flex items-center gap-3 px-4 py-2.5 rounded-lg cursor-pointer text-sm';
  a.innerHTML='<i class="fas fa-user-shield w-5 text-center"></i> Kelola Admin';
  a.onclick=function(){ go('kelolaAdmin'); }; nav.appendChild(a);
}
function stripSuperUI(){ var n=document.getElementById('navSaAdmin'); if(n) n.remove(); var s=document.getElementById('saSep'); if(s) s.remove(); }
function refreshSidebarUser(){
  var box=document.querySelector('#sidebar > div:last-child'); if(!box) return;
  var isSA=APP.userRole==='superadmin', name=localStorage.getItem('ecoUserName')||(isSA?'Super Admin':'Admin'), init=name.charAt(0).toUpperCase();
  var grad=isSA?'from-amber-400 to-orange-500':'from-indigo-400 to-purple-400';
  var roleTxt=isSA?'Super Administrator':'Admin';
  var roleClr=isSA?'color:#f59e0b;font-weight:700':'color:'+(APP.theme==='dark'?'#64748b':'#94a3b8');
  box.innerHTML='<div class="flex items-center gap-3"><div class="w-9 h-9 rounded-full bg-gradient-to-tr '+grad+' flex items-center justify-center text-white font-bold text-sm">'+(isSA?'<i class="fas fa-crown text-xs"></i>':init)+'</div><div><p class="light:text-slate-700 dark:text-slate-200 text-sm font-medium">'+name+'</p><p class="text-xs" style="'+roleClr+'">'+(isSA?'<i class="fas fa-crown" style="font-size:8px;margin-right:3px"></i>':'')+roleTxt+'</p></div></div>';

/* ===== NAVIGATION ===== */
var TITLES={dashboard:'Dashboard',pesanan:'Manajemen Pesanan',pelanggan:'Data Pelanggan',produk:'Katalog Produk',perekapan:'Perekapan Keuangan',nota:'Cetak Nota',laporan:'Laporan & Export',kelolaAdmin:'Kelola Admin'};
function go(page){
  if(!canAccess(page)){ toast('Anda tidak memiliki akses ke halaman tersebut','error'); page=firstAllowed(); }
  APP.page=page; document.getElementById('pageTitle').textContent=TITLES[page]||page;
  var items=document.querySelectorAll('.nav-item');
  for(var i=0;i<items.length;i++) items[i].classList.toggle('active',items[i].getAttribute('data-page')===page);
  destroyCharts(); render();
  if(window.innerWidth<1024) toggleSidebar(false);
}
function toggleSidebar(force){
  var sb=document.getElementById('sidebar'),ov=document.getElementById('sidebarOverlay');
  var open=force!==undefined?force:!sb.classList.contains('open');
  sb.classList.toggle('open',open); ov.classList.toggle('active',open);
}
function destroyCharts(){ for(var k in APP.charts){ if(APP.charts[k].destroy) APP.charts[k].destroy(); } APP.charts={}; }

function toast(msg,type){
  type=type||'success';
  var colors={success:'#4f46e5',error:'#dc2626',warning:'#d97706',info:'#0284c7'};
  var icons={success:'fa-check-circle',error:'fa-circle-xmark',warning:'fa-triangle-exclamation',info:'fa-circle-info'};
  var el=document.createElement('div');
  el.className='toast-enter flex items-center gap-3 px-5 py-3 rounded-xl text-white shadow-lg text-sm font-medium min-w-[280px]';
  el.style.background=colors[type]||colors.success;
  el.innerHTML='<i class="fas '+(icons[type]||icons.success)+'"></i><span class="flex-1">'+msg+'</span><button onclick="this.parentElement.remove()" class="hover:opacity-70"><i class="fas fa-xmark"></i></button>';
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(function(){ el.classList.add('toast-exit'); setTimeout(function(){el.remove();},300); },3000);
}

var _cfmCb=null;
function showConfirm(msg,cb){ _cfmCb=cb; document.getElementById('confirmMsg').textContent=msg; document.getElementById('confirmOverlay').classList.remove('hidden'); }
function closeConfirm(){ document.getElementById('confirmOverlay').classList.add('hidden'); _cfmCb=null; }
document.getElementById('confirmBtn').addEventListener('click',function(){ var cb=_cfmCb; closeConfirm(); if(cb) cb(); });

function resetData(){
  if(APP.userRole!=='superadmin') return toast('Hanya Super Admin yang bisa reset data','error');
  showConfirm('Yakin ingin mereset semua data?',function(){ APP.data=emptyData(); saveData(APP.data); go(APP.page); toast('Data berhasil direset'); });

/* ===== RENDER ===== */
function render(){
  var c=document.getElementById('content');
  if(APP.page==='kelolaAdmin' && APP.userRole==='superadmin'){ c.innerHTML=rKelolaAdmin(); c.scrollTop=0; return; }
  var fn={dashboard:rDash,pesanan:rPesanan,pelanggan:rPelanggan,produk:rProduk,perekapan:rRekap,nota:rNota,laporan:rLaporan};
  c.innerHTML=(fn[APP.page]||rDash)();
  c.scrollTop=0;
  if(APP.page==='dashboard') initCharts();
  postProcessRestrictions();
}
function postProcessRestrictions(){
  if(!canAccess('nota')){ var nb=document.querySelectorAll('button[title="Cetak Nota"]'); for(var i=0;i<nb.length;i++) nb[i].style.display='none'; }
  if(!canAccess('laporan')){ var eb=document.querySelectorAll('.btn-export'); for(var j=0;j<eb.length;j++) eb[j].style.display='none'; }
}
function goNota(id){ if(!canAccess('nota')){ toast('Fitur cetak nota hanya untuk Super Admin','warning'); return; } APP.selectedNotaId=id; go('nota'); }

/* ----- DASHBOARD ----- */

  var has=tP>0, recent=d.pesanan.slice().sort(function(a,b){return b.tglOrder.localeCompare(a.tglOrder);}).slice(0,5);
  return '<div class="fade-in space-y-6"><div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">'+
    statCard('fa-clipboard-list','Total',tP,'Total Pesanan','bg-blue-100 text-blue-500')+statCard('fa-coins','Revenue',fRp(rev),'Total Pendapatan','bg-emerald-100 text-emerald-500')+
    statCard('fa-clock','Aktif',aktif,'Pesanan Aktif','bg-amber-100 text-amber-500')+statCard('fa-users','Client',tC,'Pelanggan','bg-purple-100 text-purple-500')+

    '<div class="'+CBG+' rounded-2xl p-5 border shadow-sm"><h3 class="font-bold '+TCLR2+' mb-4">Status Pesanan</h3>'+(has?'<canvas id="chartStatus" height="160"></canvas>':C('chart-pie','Belum Ada Data','Status pesanan akan tampil di sini'))+'</div></div>'+
    '<div class="'+CBG+' rounded-2xl border shadow-sm overflow-hidden"><div class="px-5 py-4 light:border-b dark:border-b dark:border-slate-800 border-slate-100 flex items-center justify-between"><h3 class="font-bold '+TCLR2+'">Pesanan Terbaru</h3>'+(has?'<button onclick="go(\'pesanan\')" class="text-sm text-indigo-500 font-semibold hover:opacity-70">Lihat Semua <i class="fas fa-arrow-right ml-1 text-xs"></i></button>':'')+'</div>'+

function statCard(icon,label,val,sub,colorClass){

function initCharts(){
  var d=APP.data; if(d.pesanan.length===0) return;
  var dk=APP.theme==='dark',gc=dk?'rgba(255,255,255,.06)':'#f1f5f9',tc=dk?'#64748b':'#94a3b8';
  var months=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  var rd=[]; for(var i=0;i<12;i++) rd.push(0);
  for(var j=0;j<d.pesanan.length;j++){ if(d.pesanan[j].status!=='Batal') rd[new Date(d.pesanan[j].tglOrder).getMonth()]+=d.pesanan[j].total; }
  var e1=document.getElementById('chartRevenue');
  if(e1) APP.charts.rev=new Chart(e1,{type:'bar',data:{labels:months,datasets:[{label:'Pendapatan',data:rd,backgroundColor:'#4f46e5',hoverBackgroundColor:'#4338ca',borderRadius:6,borderSkipped:false}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return fRp(v);},color:tc},grid:{color:gc}},x:{grid:{display:false},ticks:{color:tc}}}}});
  var ss=['Baru','Proses','Siap Kirim','Selesai','Batal'];

  var e2=document.getElementById('chartStatus');
  if(e2) APP.charts.st=new Chart(e2,{type:'doughnut',data:{labels:ss,datasets:[{data:sc,backgroundColor:sbg,borderColor:dk?'#0f172a':'#ffffff',borderWidth:3}]},options:{responsive:true,cutout:'65%',plugins:{legend:{position:'bottom',labels:{padding:12,usePointStyle:true,pointStyleWidth:8,font:{size:11},color:dk?'#94a3b8':'#64748b'}}}}});
}

  }).join('')+'</tbody></table>';

function formRekap(id){
  var o=id?APP.data.perekapan.find(function(x){return x.id===id;}):null;
  var tOpt=['Masuk','Keluar'].map(function(t){return '<option'+(o&&o.tipe===t?' selected':'')+'>'+t+'</option>';}).join('');

  var acts='';
  if(!isSA) acts='<button onclick="saFormAdmin(\''+a.id+'\')" class="w-8 h-8 rounded-lg '+(APP.theme==='dark'?'hover:!bg-slate-800':'hover:!bg-indigo-50')+' '+(APP.theme==='dark'?'text-slate-500':'text-indigo-400')+' hover:opacity-70 flex items-center justify-center" title="Edit"><i class="fas fa-pen text-xs"></i></button><button onclick="saHapusAdmin(\''+a.id+'\')" class="w-8 h-8 rounded-lg '+(APP.theme==='dark'?'hover:!bg-red-950/30':'hover:!bg-red-50')+' text-slate-300 dark:text-slate-600 hover:!text-red-400 flex items-center justify-center" title="Hapus"><i class="fas fa-trash text-xs"></i></button><button onclick="saToggleAdmin(\''+a.id+'\')" class="w-8 h-8 rounded-lg '+(APP.theme==='dark'?'hover:!bg-amber-950/30':'hover:!bg-amber-50')+' text-slate-300 dark:text-slate-600 hover:!text-amber-400 flex items-center justify-center" title="'+(a.active?'Nonaktifkan':'Aktifkan')+'"><i class="fas fa-'+(a.active?'ban':'check')+' text-xs"></i></button>';
  return '<div style="'+bgC+'" class="rounded-2xl border shadow-sm p-5 hover:shadow-md transition-shadow relative overflow-hidden">'+(isSA?'<div class="absolute top-0 right-0 w-24 h-24" style="background:radial-gradient(circle at top right,rgba(245,158,11,.08),transparent 70%)"></div>':'')+'<div class="flex items-start justify-between mb-4"><div class="flex items-center gap-3"><div class="w-12 h-12 rounded-xl bg-gradient-to-tr '+grad+' flex items-center justify-center text-white font-bold text-lg shadow-md">'+(isSA?'<i class="fas fa-crown text-sm"></i>':a.nama.charAt(0).toUpperCase())+'</div><div><p class="font-bold" style="color:'+txC+'">'+a.nama+'</p><p class="text-xs font-mono" style="color:'+txC2+'">@'+a.username+'</p></div></div><div class="flex gap-1">'+acts+'</div></div><div class="flex items-center gap-2 flex-wrap"><span class="badge" style="'+rClr+'">'+(isSA?'<i class="fas fa-crown" style="font-size:8px;margin-right:3px"></i>':'')+(isSA?'Super Admin':'Admin')+'</span><span class="badge" style="'+sClr+'">'+(a.active?'Aktif':'Nonaktif')+'</span></div>'+(a.createdAt?'<p class="text-xs mt-3" style="color:'+txC2+'"><i class="fas fa-calendar-plus" style="margin-right:4px"></i>Dibuat: '+fDt(a.createdAt)+'</p>':'')+'</div>';
}
function saFormAdmin(id){
  var admins=loadAdmins(),o=id?admins.find(function(x){return x.id===id;}):null;
  var body='<div class="space-y-4">'+mkField('Nama Lengkap','sa_nama','text',o?o.nama:'')+'<div><label class="block text-sm font-semibold light:text-slate-700 dark:text-slate-300 mb-1">Username</label><input id="sa_username" type="text" value="'+(o?o.username:'')+'" class="w-full '+INP+'" placeholder="huruf kecil, tanpa spasi" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,\'\')"></div>'+'<div><label class="block text-sm font-semibold light:text-slate-700 dark:text-slate-300 mb-1">Password'+(o?' <span class="font-normal '+SCLR+'">(kosongkan jika tidak diubah)</span>':'')+'</label><div class="relative"><input id="sa_pass" type="password" class="w-full '+INP+' pr-10" placeholder="'+(o?'••••••••':'Minimal 4 karakter')+'"><button type="button" onclick="var el=document.getElementById(\'sa_pass\');el.type=el.type===\'password\'?\'text\':\'password\'" class="absolute right-3 top-1/2 -translate-y-1/2 '+SCLR+' hover:opacity-70"><i class="fas fa-eye text-xs"></i></button></div></div>'+'<div><label class="block text-sm font-semibold light:text-slate-700 dark:text-slate-300 mb-1">Konfirmasi Password</label><input id="sa_pass2" type="password" class="w-full '+INP+'" placeholder="Ulangi password"></div></div>';
  showModal(o?'Edit Admin':'Tambah Admin Baru',body,'<button onclick="closeModal()" class="px-4 py-2 rounded-xl light:bg-slate-100 dark:bg-slate-800 '+SCLR+' font-semibold text-sm hover:opacity-80">Batal</button><button onclick="saSimpanAdmin(\''+(id||'')+'\')" class="btn-primary px-5 py-2 rounded-xl text-sm font-semibold">Simpan</button>');
}
function saSimpanAdmin(id){
  var nama=document.getElementById('sa_nama').value.trim(),username=document.getElementById('sa_username').value.trim(),pw=document.getElementById('sa_pass').value,pw2=document.getElementById('sa_pass2').value;
  if(!nama) return toast('Nama wajib diisi','error'); if(!username) return toast('Username wajib diisi','error'); if(username.length<3) return toast('Username minimal 3 karakter','error');
  var admins=loadAdmins();
  for(var i=0;i<admins.length;i++){ if(admins[i].username===username && admins[i].id!==id) return toast('Username sudah digunakan','error'); }
  if(id){ for(var j=0;j<admins.length;j++){ if(admins[j].id===id){ admins[j].nama=nama; admins[j].username=username; if(pw){ if(pw!==pw2) return toast('Konfirmasi password tidak cocok','error'); if(pw.length<4) return toast('Password minimal 4 karakter','error'); admins[j].password=pw; } break; } } toast('Data admin diperbarui'); }
  else { if(!pw) return toast('Password wajib diisi untuk akun baru','error'); if(pw!==pw2) return toast('Konfirmasi password tidak cocok','error'); if(pw.length<4) return toast('Password minimal 4 karakter','error'); admins.push({id:gid(),username:username,password:pw,nama:nama,role:'admin',active:true,createdAt:new Date().toISOString()}); toast('Admin baru berhasil ditambahkan'); }
  saveAdmins(admins); closeModal(); go('kelolaAdmin');
}
function saHapusAdmin(id){ showConfirm('Yakin ingin menghapus akun admin ini?',function(){ saveAdmins(loadAdmins().filter(function(a){return a.id!==id;})); go('kelolaAdmin'); toast('Akun admin dihapus'); }); }
function saToggleAdmin(id){ var admins=loadAdmins(); for(var i=0;i<admins.length;i++){ if(admins[i].id===id){ admins[i].active=!admins[i].active; toast('Akun '+(admins[i].active?'diaktifkan':'dinonaktifkan'),admins[i].active?'success':'warning'); break; } } saveAdmins(admins); go('kelolaAdmin'); }
function saResetDB(){ showConfirm('PERINGATAN: Semua data pesanan, pelanggan, produk, dan perekapan akan dihapus permanen. Lanjutkan?',function(){ APP.data=emptyData(); saveData(APP.data); go('kelolaAdmin'); toast('Semua data telah dihapus','success'); }); }

/* ===== INIT ===== */
(function(){
  APP.data=loadData(); loadNotaSettings(); loadTheme(); loadAdmins();
  document.getElementById('currentDate').textContent=fDtFull(new Date());
  if(localStorage.getItem('ecoSportLogin')){
    APP.userRole=localStorage.getItem('ecoUserRole')||'admin';
    APP.isLoggedIn=true;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appContainer').classList.remove('hidden');
    if(!canAccess(APP.page)) APP.page=firstAllowed();
    applyRoleUI(); go(APP.page);
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
  }
})();
</script>
</body>
</html>
